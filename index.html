<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小小數學家：運算符號大挑戰</title>
    <style>
        body { font-family: 'Microsoft JhengHei', 'Heiti TC', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px 0; background-color: #f0f9ff; color: #333; font-size: 1.2rem; }
        .container { width: 90%; max-width: 600px; background-color: #ffffff; padding: 25px; border-radius: 15px; box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1); text-align: center; position: relative; }
        .hidden { display: none !important; }
        h1, h2 { color: #01579b; margin-top: 0; }
        .instructions { font-size: 1.1rem; color: #555; margin-bottom: 15px; }
        .button { border: none; padding: 15px 30px; font-size: 1.5rem; border-radius: 10px; cursor: pointer; transition: all 0.3s; margin: 10px; user-select: none; }
        .button:hover:not(:disabled) { opacity: 0.85; transform: translateY(-2px); }
        #game-interface { position: relative; }
        .header-info { display: flex; justify-content: space-around; margin-bottom: 25px; font-weight: bold; font-size: 1.5rem; }
        .header-info div { background-color: #e3f2fd; padding: 10px 15px; border-radius: 10px; }
        #problem-container { margin-bottom: 25px; font-size: 2.5rem; font-weight: bold; display: flex; justify-content: center; align-items: center; flex-wrap: wrap; min-height: 80px; }
        select { font-size: 1.2rem; margin: 8px 10px; border-radius: 5px; border: 2px solid #0288d1; font-family: inherit; padding: 8px; }
        #problem-container select { font-size: 2rem; min-width: 60px; padding: 5px; }
        .section-divider { border: 0; height: 2px; background-color: #eeeeee; margin: 25px 0; }
        #leaderboard { margin-top: 20px; text-align: left; max-height: 300px; overflow-y: auto; }
        #leaderboard table { width: 100%; border-collapse: collapse; }
        #leaderboard th, #leaderboard td { padding: 8px 12px; border: 1px solid #ddd; text-align: center; }
        #leaderboard th { background-color: #0288d1; color: white; }
        #leaderboard .current-player { background-color: #fff9c4 !important; font-weight: bold; }
        .designer-credit { position: fixed; bottom: 10px; right: 15px; font-size: 0.8rem; color: #aaa; }
        .difficulty-buttons button { color: white; width: 80%; }
        .difficulty-buttons .level-1 { background-color: #4caf50; }
        .difficulty-buttons .level-2 { background-color: #ff9800; }
        .difficulty-buttons .level-3 { background-color: #f44336; }
        #final-score-message { font-size: 2rem; font-weight: bold; margin: 20px 0; color: #d32f2f; }
        .skills-panel { position: absolute; top: 0; right: -140px; width: 120px; display: flex; flex-direction: column; }
        .skill-button { font-size: 1rem; padding: 8px 12px; width: 100%; background-color: #9c27b0; color: white; }
        #pause-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; color: white; font-size: 3rem; font-weight: bold; z-index: 10; border-radius: 15px;}
        #combo-display { position: absolute; top: 40%; left: 50%; transform: translateX(-50%); font-size: 4rem; font-weight: bold; color: #ff5722; text-shadow: 2px 2px 5px rgba(0,0,0,0.3); opacity: 0; pointer-events: none; animation: combo-animation 1s ease-out; }
        @keyframes combo-animation { 0% { opacity: 1; transform: translateX(-50%) scale(0.5); } 80% { opacity: 1; transform: translateX(-50%) scale(1.2); } 100% { opacity: 0; transform: translateX(-50%) scale(1.2); } }
        #score-display.score-pop { transform: scale(1.25); color: #f44336; }
    </style>
</head>
<body>

<div id="main-container" class="container">
    <div id="main-menu-screen">
        <h1>運算符號大挑戰</h1>
        <p class="instructions">遊戲玩法：選擇 + 或 - ，使算式成立。</p>
        <div id="player-identity-section"><h2>第一步：選擇身份</h2><label for="class-select">班別:</label><select id="class-select"></select><label for="student-id-select">學號:</label><select id="student-id-select"></select></div>
        <div id="difficulty-section" class="difficulty-buttons"><h2>第二步：選擇難度開始遊戲</h2><button class="button level-1" onclick="startGame(1)">難度一</button><button class="button level-2" onclick="startGame(2)">難度二</button><button class="button level-3" onclick="startGame(3)">難度三</button></div>
        <hr class="section-divider"><div id="leaderboard-section"><h2>雲端積分排行榜</h2><div id="leaderboard"><p>正在從雲端載入排行榜...</p></div></div>
    </div>

    <!-- *** 已補全此處的 HTML 結構 *** -->
    <div id="game-interface" class="hidden">
        <div class="skills-panel"><button id="pause-button" class="button skill-button" onclick="togglePause()">⏸️ 時間暫停</button><button id="skip-button" class="button skill-button" onclick="skipQuestion()">⏩ 跳過此題</button></div>
        <div class="header-info"><div id="score-display">分數: 0</div><div id="timer-display">時間: 60</div></div>
        <div id="problem-container"></div>
        <div id="feedback"></div><div id="combo-display"></div>
        <button id="check-button" class="button">檢查答案</button>
        <div id="pause-overlay" class="hidden">遊戲已暫停</div>
    </div>
    
    <div id="game-over-screen" class="hidden">
        <h2>時間到！遊戲結束！</h2>
        <div id="final-score-message"></div>
        <p class="instructions" style="margin-top: 20px;">正在自動記錄分數並返回主選單...</p>
    </div>
</div>

<div class="designer-credit">Designed by Miss Lui SY</div>
<audio id="sound-correct" src="correct.mp3" preload="auto"></audio><audio id="sound-wrong" src="wrong.mp3" preload="auto"></audio><audio id="sound-click" src="click.mp3" preload="auto"></audio>

<script>
    // --- 重要設定 ---
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzWIU1wmjEQCTx-tmZ7a7qJJphMZrUITf7RATO2va3JVL5FhHlmTI546QGFNc7Roc-V/exec"; 

    // --- DOM 元素 ---
    const mainMenuScreen = document.getElementById('main-menu-screen'), gameInterface = document.getElementById('game-interface'), gameOverScreen = document.getElementById('game-over-screen');
    const classSelect = document.getElementById('class-select'), studentIdSelect = document.getElementById('student-id-select');
    const checkButton = document.getElementById('check-button'), scoreDisplay = document.getElementById('score-display'), timerDisplay = document.getElementById('timer-display');
    const problemContainer = document.getElementById('problem-container'), feedback = document.getElementById('feedback'), finalScoreMessage = document.getElementById('final-score-message');
    const comboDisplay = document.getElementById('combo-display'), pauseOverlay = document.getElementById('pause-overlay');
    const pauseButton = document.getElementById('pause-button'), skipButton = document.getElementById('skip-button');

    // --- 全域變數 ---
    let score, timer, timerInterval, consecutiveCorrect, gamePaused;
    let canUseSkip, canUsePause;
    let gameSettings = {}, currentPlayer = {}, currentProblemData;

    // --- 雲端數據處理 ---
    async function fetchLeaderboard() {
        const leaderboardDiv = document.getElementById('leaderboard');
        leaderboardDiv.innerHTML = '<p>正在從雲端載入排行榜...</p>';
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 8000);
            const response = await fetch(SCRIPT_URL, { signal: controller.signal });
            clearTimeout(timeoutId);
            if (!response.ok) throw new Error(`伺服器回應錯誤: ${response.status}`);
            const data = await response.json();
            displayLeaderboard(data);
        } catch (error) {
            console.error('讀取排行榜失敗:', error);
            leaderboardDiv.innerHTML = '<p style="color: red; font-weight: bold;">讀取排行榜失敗！<br><span style="font-weight: normal; font-size: 0.9rem;">遊戲仍可進行，但分數無法雲端排名。</span></p>';
        }
    }

    async function saveScoreToCloud() {
        const data = { class: currentPlayer.class, studentId: currentPlayer.studentId, score: score };
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 8000);
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data), headers: { 'Content-Type': 'application/json' }, keepalive: true, signal: controller.signal });
            clearTimeout(timeoutId);
        } catch (error) {
            console.error('儲存分數請求發送失敗:', error);
        } finally {
            setTimeout(() => { fetchLeaderboard(); showScreen(mainMenuScreen); }, 3000);
        }
    }

    function displayLeaderboard(leaderboardData, highlightCurrent = false) {
        const leaderboardDiv = document.getElementById('leaderboard');
        if (!Array.isArray(leaderboardData)) { leaderboardDiv.innerHTML = '<p style="color: red;">排行榜資料格式錯誤。</p>'; return; }
        let tableHTML = leaderboardData.length === 0 ? '<p>排行榜上還沒有分數！</p>' : '<table><thead><tr><th>排名</th><th>班別</th><th>學號</th><th>分數</th></tr></thead><tbody>';
        if (leaderboardData.length > 0) {
            leaderboardData.forEach((player, index) => {
                const isCurrentPlayer = highlightCurrent && player.id === currentPlayer.id;
                tableHTML += `<tr ${isCurrentPlayer ? 'class="current-player"' : ''}><td>${index + 1}</td><td>${player.class}</td><td>${player.studentId}號</td><td>${player.score}</td></tr>`;
            });
            tableHTML += '</tbody></table>';
        }
        leaderboardDiv.innerHTML = tableHTML;
    }

    // --- *** 已補全所有遊戲邏輯函數 *** ---
    function showScreen(screen) {
        [mainMenuScreen, gameInterface, gameOverScreen].forEach(s => s.classList.add('hidden'));
        if (screen) screen.classList.remove('hidden');
    }

    function initialize() {
        const classes = ['3A', '3B', '3C', '3D', '3E'];
        classes.forEach(c => classSelect.innerHTML += `<option value="${c}">${c}</option>`);
        for (let i = 1; i <= 27; i++) studentIdSelect.innerHTML += `<option value="${i}">${i}號</option>`;
        document.querySelectorAll('.button').forEach(button => button.addEventListener('click', () => playSound('click')));
        checkButton.addEventListener('click', checkAnswer);
        fetchLeaderboard(); 
        showScreen(mainMenuScreen); 
    }

    function startGame(difficulty) {
        currentPlayer = { class: classSelect.value, studentId: studentIdSelect.value, id: `${classSelect.value}-${studentIdSelect.value}` };
        switch(difficulty) {
            case 1: gameSettings = { maxNumber: 10, basePoints: 10 }; break;
            case 2: gameSettings = { maxNumber: 20, basePoints: 15 }; break;
            case 3: gameSettings = { maxNumber: 35, basePoints: 20 }; break;
        }
        score = 0; consecutiveCorrect = 0; timer = 60; gamePaused = false;
        canUseSkip = true; canUsePause = true;
        updateScoreDisplay(); timerDisplay.textContent = `時間: ${timer}`;
        pauseButton.disabled = false; pauseButton.textContent = "⏸️ 時間暫停";
        skipButton.disabled = false;
        pauseOverlay.classList.add('hidden');
        feedback.textContent = '';
        comboDisplay.textContent = '';
        showScreen(gameInterface);
        generateProblem();
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => { if (!gamePaused) { timer--; timerDisplay.textContent = `時間: ${timer}`; if (timer <= 0) endGame(); }}, 1000);
    }

    function endGame() {
        clearInterval(timerInterval);
        checkButton.disabled = true;
        finalScoreMessage.textContent = `你的最終得分是: ${score}`;
        showScreen(gameOverScreen);
        saveScoreToCloud();
    }

    function generateProblem() {
        let problem = null, attemptCounter = 0;
        while (problem === null && attemptCounter < 500) { problem = tryGenerateProblem(); attemptCounter++; }
        if (!problem) { gameSettings.baseNumber = Math.floor(gameSettings.maxNumber / 2) + 1; problem = tryGenerateProblem(); delete gameSettings.baseNumber; }
        currentProblemData = problem;
        problemContainer.innerHTML = '';
        problemContainer.appendChild(document.createTextNode(currentProblemData.displayParts[0]));
        problemContainer.appendChild(createOperatorSelect());
        problemContainer.appendChild(document.createTextNode(currentProblemData.displayParts[1]));
        problemContainer.appendChild(createOperatorSelect());
        problemContainer.appendChild(document.createTextNode(currentProblemData.displayParts[2]));
        feedback.textContent = '';
    }

    function tryGenerateProblem() {
        const { maxNumber } = gameSettings, baseNum = gameSettings.baseNumber || maxNumber, operators = ['+', '-'];
        const num1 = Math.ceil(Math.random() * baseNum), num2 = Math.ceil(Math.random() * baseNum), num3 = Math.ceil(Math.random() * baseNum);
        const op1 = operators[Math.floor(Math.random() * 2)], op2 = operators[Math.floor(Math.random() * 2)];
        const useParentheses = Math.random() > 0.5;
        let result, isValid = true, displayParts;
        if (useParentheses) { let secondResult = eval(`${num2} ${op2} ${num3}`); if (secondResult < 0 || secondResult >= maxNumber) isValid = false; result = eval(`${num1} ${op1} ${secondResult}`); displayParts = [`${num1}`, `(${num2}`, `${num3}) = ${result}`]; } 
        else { let firstResult = eval(`${num1} ${op1} ${num2}`); if (firstResult < 0 || firstResult >= maxNumber) isValid = false; result = eval(`${firstResult} ${op2} ${num3}`); displayParts = [`${num1}`, `${num2}`, `${num3} = ${result}`]; }
        if (result < 0 || result >= maxNumber || !Number.isInteger(result)) isValid = false;
        if (isValid) return { numbers: [num1, num2, num3], hasParentheses: useParentheses, expectedResult: result, displayParts: displayParts };
        return null;
    }
    
    function checkAnswer() {
        const selects = problemContainer.getElementsByTagName('select');
        if (selects.length < 2) return;
        const userOp1 = selects[0].value, userOp2 = selects[1].value;
        if (userOp1 === "" || userOp2 === "") { feedback.style.color = '#f39c12'; feedback.textContent = '請填上所有運算符號！'; return; }
        const [num1, num2, num3] = currentProblemData.numbers;
        let calculatedResult = currentProblemData.hasParentheses ? eval(`${num1} ${userOp1} (${num2} ${userOp2} ${num3})`) : eval(`(${num1} ${userOp1} ${num2}) ${userOp2} ${num3}`);
        if (calculatedResult === currentProblemData.expectedResult) {
            playSound('correct');
            consecutiveCorrect++;
            const { basePoints } = gameSettings, bonusPoints = (consecutiveCorrect - 1) * 5, pointsGained = basePoints + bonusPoints;
            score += pointsGained;
            feedback.style.color = 'green'; feedback.textContent = `答對了！ +${pointsGained}分` + (bonusPoints > 0 ? ` (獎勵+${bonusPoints})` : '');
            updateScoreDisplay(true);
            if (consecutiveCorrect > 1) showCombo(consecutiveCorrect);
            checkButton.disabled = true; setTimeout(() => { generateProblem(); checkButton.disabled = false; }, 900);
        } else {
            playSound('wrong');
            consecutiveCorrect = 0;
            comboDisplay.textContent = '';
            feedback.style.color = 'red'; feedback.textContent = '不對喔，再試一次！';
        }
    }

    function togglePause() { if (!canUsePause) return; gamePaused = !gamePaused; pauseOverlay.classList.toggle('hidden'); if (gamePaused) { pauseButton.textContent = "▶️ 繼續遊戲"; } else { canUsePause = false; pauseButton.textContent = "✅ 已用完"; pauseButton.disabled = true; } }
    function skipQuestion() { if (!canUseSkip) return; canUseSkip = false; skipButton.disabled = true; score = Math.max(0, score - 5); feedback.style.color = '#f39c12'; feedback.textContent = '已跳過此題 (-5分)'; updateScoreDisplay(); setTimeout(() => generateProblem(), 800); }
    function showCombo(count) { comboDisplay.textContent = `COMBO x${count}!`; comboDisplay.style.animation = 'none'; comboDisplay.offsetHeight; comboDisplay.style.animation = 'combo-animation 1s ease-out'; }
    function createOperatorSelect() { const select = document.createElement('select'); select.innerHTML = `<option value="" disabled selected>&nbsp;</option><option value="+">+</option><option value="-">-</option>`; return select; }
    function updateScoreDisplay(pop = false) { scoreDisplay.textContent = `分數: ${score}`; if (pop) { scoreDisplay.classList.add('score-pop'); setTimeout(() => scoreDisplay.classList.remove('score-pop'), 200); } }
    function playSound(soundName) { const sound = document.getElementById(`sound-${soundName}`); if (sound) { sound.currentTime = 0; sound.play().catch(e => {}); } }

    // --- 啟動 ---
    initialize();
</script>

</body>
</html>
